services:
  jet-copilot:
    build: .
    container_name: jet-copilot
    restart: unless-stopped
    user: "${UID:-1000}:${GID:-1000}"
    environment:
      - HOME=/home/jetuser
      - DOTNET_BUNDLE_EXTRACT_BASE_DIR=/tmp/dotnet-bundle
    volumes:
      # Working directory for Copilot sessions
      - ~/workspace:/workspace
      # Copilot CLI auth + session history (for --resume)
      - ~/.copilot:/home/jetuser/.copilot
      # Dev Tunnels auth
      - ~/.devtunnels:/home/jetuser/.devtunnels
