<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Jet Copilot</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@6.0.0/css/xterm.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <div id="terminal-screen" class="screen">
      <header>
        <a href="/" class="back-link">←</a>
        <span id="session-label" class="session-label"></span>
        <div class="header-shortcuts">
          <button class="shortcut-btn" onclick="sendKey('esc')">ESC</button>
          <button class="shortcut-btn" onclick="sendKey('mode')">Mode</button>
          <button class="shortcut-btn" onclick="sendKey('up')">↑</button>
          <button class="shortcut-btn" onclick="sendKey('down')">↓</button>
          <button class="shortcut-btn" onclick="sendKey('enter')">Enter</button>
        </div>
        <span id="status-dot" class="status-dot offline"></span>
      </header>
      <div id="terminal-container"></div>
      <button id="voice-toggle" class="voice-toggle" onclick="toggleVoiceInput()">🎙</button>
      <div id="voice-bar" class="voice-bar hidden">
        <input type="text" id="voice-input" class="voice-input" placeholder="Voice input...">
        <button class="voice-send" onclick="sendVoiceInput()">Send</button>
        <button class="voice-close" onclick="toggleVoiceInput()">✕</button>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@6.0.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.11.0/lib/addon-fit.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-web-links@0.12.0/lib/addon-web-links.js"></script>
  <script src="app.js"></script>
</body>
</html>
