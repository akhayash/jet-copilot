<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Jet Copilot</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@6.0.0/css/xterm.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <div id="terminal-screen" class="screen">
      <header>
        <a href="/" class="back-link">←</a>
        <div class="session-meta">
          <span id="session-context" class="session-context"></span>
          <span id="session-label" class="session-label"></span>
        </div>
        <div class="header-shortcuts" id="shortcuts">
          <button class="shortcut-btn" data-key="esc">ESC</button>
          <button class="shortcut-btn" data-key="mode">Mode</button>
          <button class="shortcut-btn" data-key="up">↑</button>
          <button class="shortcut-btn" data-key="down">↓</button>
          <button class="shortcut-btn" data-key="enter">Enter</button>
          <button class="shortcut-btn reset-btn" data-key="reset">Reset</button>
        </div>
        <span id="status-dot" class="status-dot offline"></span>
      </header>
      <div id="terminal-container"></div>
      <div class="floating-buttons">
        <button id="preview-toggle" class="voice-toggle" onclick="togglePreviewInput()">🔗</button>
        <button id="image-toggle" class="voice-toggle" onclick="toggleImageUpload()">📎</button>
        <button id="paste-toggle" class="voice-toggle" onclick="pasteFromClipboard()">📋</button>
        <button id="voice-toggle" class="voice-toggle" onclick="toggleVoiceInput()">⌨️</button>
      </div>
      <div id="preview-panel" class="preview-panel hidden">
        <div class="preview-panel-header">
          <div>
            <div class="preview-panel-title">Session Preview</div>
            <div class="preview-panel-copy">Open or stop previews for the service you are working on now.</div>
          </div>
          <button class="voice-close" onclick="togglePreviewInput()">✕</button>
        </div>
        <div class="preview-input-group preview-input-group-terminal">
          <input type="number" id="preview-port-input" class="preview-port-input" placeholder="Port (e.g. 3001)" min="1" max="65535">
          <button class="preview-open-btn" onclick="openPreview()">Open</button>
        </div>
        <div id="session-preview-summary" class="preview-summary hidden"></div>
        <div id="session-preview-list" class="preview-list preview-list-terminal"></div>
      </div>
      <div id="voice-bar" class="voice-bar hidden">
        <textarea id="voice-input" class="voice-input" placeholder="Voice input..." rows="1"></textarea>
        <button class="voice-send" onclick="sendVoiceInput()">Send</button>
        <button class="voice-close" onclick="toggleVoiceInput()">✕</button>
      </div>
      <div id="image-bar" class="voice-bar hidden">
        <label class="image-file-label">
          <span id="image-file-name">画像を選択</span>
          <input type="file" id="image-file-input" accept="image/*" style="display:none">
        </label>
        <button class="voice-send" onclick="uploadImage()">送信</button>
        <button class="voice-close" onclick="toggleImageUpload()">✕</button>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@6.0.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.11.0/lib/addon-fit.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-web-links@0.12.0/lib/addon-web-links.js"></script>
  <script src="app-utils.js"></script>
  <script src="app.js"></script>
</body>
</html>
