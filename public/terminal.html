<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Jet Copilot</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@6.0.0/css/xterm.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <div id="terminal-screen" class="screen">
      <header>
        <a href="/" class="back-link"><i data-lucide="arrow-left"></i></a>
        <div class="session-meta">
          <span id="session-context" class="session-context"></span>
          <span id="session-label" class="session-label"></span>
        </div>
        <div class="header-tools">
          <button id="preview-toggle" class="header-tool-btn" onclick="togglePreviewInput()" title="Preview"><i data-lucide="globe"></i></button>
          <button id="image-toggle" class="header-tool-btn" onclick="toggleImageUpload()" title="Upload"><i data-lucide="paperclip"></i></button>
          <button id="paste-toggle" class="header-tool-btn" onclick="pasteFromClipboard()" title="Paste"><i data-lucide="clipboard"></i></button>
          <button id="voice-toggle" class="header-tool-btn" onclick="toggleVoiceInput()" title="Text"><i data-lucide="keyboard"></i></button>
          <button id="capture-toggle" class="header-tool-btn" onclick="toggleCapturePanel()" title="Capture"><i data-lucide="camera"></i></button>
          <button id="history-toggle" class="header-tool-btn" onclick="toggleHistoryPanel()" title="History"><i data-lucide="message-square"></i></button>
        </div>
        <span id="status-dot" class="status-dot offline"></span>
      </header>
      <div id="terminal-container"></div>
      <div class="shortcut-bar" id="shortcuts">
        <button class="shortcut-btn" data-key="esc">ESC</button>
        <button class="shortcut-btn" data-key="mode">Mode</button>
        <button class="shortcut-btn" data-key="up">↑</button>
        <button class="shortcut-btn" data-key="down">↓</button>
        <button class="shortcut-btn" data-key="enter">Enter</button>
        <button class="shortcut-btn" data-key="enqueue">Enqueue</button>
        <button class="shortcut-btn reset-btn" data-key="reset">Reset</button>
        <button id="kb-toggle" class="shortcut-btn" onclick="toggleKeyboard()"><i data-lucide="lock" class="icon-inline"></i> KB</button>
      </div>
      <div id="preview-panel" class="preview-panel">
        <div class="preview-panel-header">
          <div>
            <div class="preview-panel-title">Session Preview</div>
            <div class="preview-panel-copy">Open or stop previews for the service you are working on now.</div>
          </div>
          <button class="voice-close" onclick="togglePreviewInput()"><i data-lucide="x"></i></button>
        </div>
        <div class="preview-input-group preview-input-group-terminal">
          <input type="number" id="preview-port-input" class="preview-port-input" placeholder="Port (e.g. 3001)" min="1" max="65535">
          <button class="preview-open-btn" onclick="openPreview()">Open</button>
        </div>
        <div id="session-preview-summary" class="preview-summary hidden"></div>
        <div id="session-preview-list" class="preview-list preview-list-terminal"></div>
      </div>
      <div id="voice-bar" class="voice-bar">
        <textarea id="voice-input" class="voice-input" placeholder="Voice input..." rows="1"></textarea>
        <button class="voice-send" onclick="sendVoiceInput()">Send</button>
        <button class="voice-close" onclick="toggleVoiceInput()"><i data-lucide="x"></i></button>
      </div>
      <div id="image-bar" class="voice-bar">
        <label class="image-file-label">
          <span id="image-file-name">Select image</span>
          <input type="file" id="image-file-input" accept="image/*" style="display:none">
        </label>
        <button class="voice-send" onclick="uploadImage()">Send</button>
        <button class="voice-close" onclick="toggleImageUpload()"><i data-lucide="x"></i></button>
      </div>
      <div id="capture-panel" class="capture-panel">
        <div class="capture-panel-header">
          <div>
            <div class="preview-panel-title"><i data-lucide="camera" class="icon-inline"></i> Window Capture</div>
            <div class="preview-panel-copy">Capture a window on the server for visual confirmation.</div>
          </div>
          <button class="voice-close" onclick="toggleCapturePanel()"><i data-lucide="x"></i></button>
        </div>
        <div class="capture-input-group">
          <button class="capture-refresh-btn" onclick="loadCaptureWindows()"><i data-lucide="refresh-cw"></i></button>
          <select id="capture-window-select" class="capture-window-select">
            <option value="">Loading...</option>
          </select>
          <button class="preview-open-btn" onclick="captureWindow()"><i data-lucide="camera" class="icon-inline"></i> Capture</button>
        </div>
      </div>
      <div id="history-panel" class="history-panel">
        <div class="preview-panel-header">
          <div>
            <div class="preview-panel-title"><i data-lucide="message-square" class="icon-inline"></i> Conversation History</div>
          </div>
          <button class="voice-close" onclick="toggleHistoryPanel()"><i data-lucide="x"></i></button>
        </div>
        <div id="history-content" class="history-content">Loading...</div>
      </div>
      <div id="capture-modal" class="capture-modal hidden" onclick="closeCaptureModal(event)">
        <div class="capture-modal-content" onclick="event.stopPropagation()">
          <img id="capture-modal-img" class="capture-modal-img" src="" alt="Captured window">
          <div class="capture-modal-info" id="capture-modal-info"></div>
          <div class="capture-modal-actions">
            <button class="preview-action-btn" onclick="recaptureWindow()"><i data-lucide="refresh-cw" class="icon-inline"></i> Re-capture</button>
            <button class="preview-action-btn" onclick="copyCapturedPath()"><i data-lucide="clipboard" class="icon-inline"></i> Copy Path</button>
            <button class="preview-action-btn" onclick="sendCapturedPath()"><i data-lucide="send" class="icon-inline"></i> Send to CLI</button>
            <button class="preview-stop-btn" onclick="closeCaptureModal()"><i data-lucide="x" class="icon-inline"></i> Close</button>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@6.0.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.11.0/lib/addon-fit.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-web-links@0.12.0/lib/addon-web-links.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@15.0.7/marked.min.js"></script>
  <script src="app-utils.js"></script>
  <script src="app.js"></script>
  <script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
