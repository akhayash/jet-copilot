<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Jet Copilot</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <div class="dashboard">
      <header>
        <h1><i data-lucide="rocket" class="icon-inline"></i> Jet Copilot</h1>
        <button id="qr-btn" class="qr-btn" onclick="showQrModal()" title="Show QR Code">
          <i data-lucide="qr-code"></i>
        </button>
        <span id="server-status" class="server-status">
          <span id="status-indicator" class="status-dot offline"></span>
          <span id="status-text">Connecting...</span>
        </span>
      </header>

      <div class="dashboard-content">
        <div class="new-session-group">
          <div class="cwd-picker">
            <input type="text" id="cwd-input" class="cwd-input" placeholder="Working directory" readonly onclick="openBrowser()">
            <button class="browse-btn" onclick="openBrowser()"><i data-lucide="folder"></i></button>
          </div>
          <div id="folder-browser" class="folder-browser hidden">
            <div id="folder-current" class="folder-current"></div>
            <input type="text" id="folder-filter" class="folder-filter" placeholder="フォルダ名で絞り込み...">
            <div id="folder-list" class="folder-list"></div>
          </div>
          <button id="new-session-btn" class="new-session-btn" onclick="createSession()">
            + New Session
          </button>
        </div>

        <section id="active-section" class="session-section hidden">
          <h2>Active Sessions</h2>
          <div id="active-sessions"></div>
        </section>

        <section id="past-section" class="session-section hidden">
          <h2>Past Sessions</h2>
          <div id="past-sessions"></div>
        </section>

        <section id="copilot-sessions-section" class="session-section hidden">
          <h2><i data-lucide="message-square" class="icon-inline"></i> Copilot History</h2>
          <div id="copilot-sessions"></div>
        </section>

        <section class="session-section preview-section preview-section-dashboard">
          <div class="section-heading">
            <h2>Quick Preview</h2>
            <p class="section-copy">Launch a preview quickly here. Rich preview management stays inside each session.</p>
          </div>
          <div class="preview-input-group">
            <input type="number" id="preview-port" class="preview-port-input" placeholder="Port (e.g. 3001)" min="1" max="65535">
            <button class="preview-open-btn" onclick="startPreview()"><i data-lucide="play" class="icon-inline"></i> Open</button>
          </div>
          <div id="preview-summary" class="preview-summary hidden"></div>
          <div id="preview-list"></div>
        </section>

        <section class="session-section capture-section">
          <div class="section-heading">
            <h2><i data-lucide="camera" class="icon-inline"></i> Window Capture</h2>
            <p class="section-copy">Capture a window on the server machine for visual confirmation.</p>
          </div>
          <div class="capture-input-group">
            <button class="capture-refresh-btn" onclick="loadDashboardWindows()"><i data-lucide="refresh-cw"></i></button>
            <select id="dashboard-capture-select" class="capture-window-select">
              <option value="">Click to load windows</option>
            </select>
            <button class="preview-open-btn" onclick="dashboardCapture()"><i data-lucide="camera" class="icon-inline"></i> Capture</button>
          </div>
          <div id="dashboard-capture-area" class="capture-preview-area"></div>
        </section>

        <footer class="dashboard-footer">
          <span id="version-text" class="version-text"></span>
          <button id="update-btn" class="update-btn" onclick="updateServer()" style="display:none"><i data-lucide="refresh-cw" class="icon-inline"></i> Update</button>
        </footer>
      </div>
    </div>
  </div>
  <div id="qr-modal" class="qr-modal hidden" onclick="hideQrModal(event)">
    <div class="qr-modal-content" onclick="event.stopPropagation()">
      <button class="qr-modal-close" onclick="hideQrModal()">&times;</button>
      <div id="qr-image" class="qr-image"></div>
      <div id="qr-url" class="qr-url"></div>
      <button class="qr-copy-btn" onclick="copyQrUrl()"><i data-lucide="clipboard" class="icon-inline"></i> Copy URL</button>
    </div>
  </div>
  <script src="app-utils.js"></script>
  <script src="dashboard.js"></script>
  <script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
