<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Jet Copilot</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <div class="dashboard">
      <header>
        <h1>✈️ Jet Copilot</h1>
        <span id="server-status" class="server-status">
          <span id="status-indicator" class="status-dot offline"></span>
          <span id="status-text">Connecting...</span>
        </span>
      </header>

      <div class="dashboard-content">
        <button id="new-session-btn" class="new-session-btn" onclick="createSession()">
          + New Session
        </button>

        <section id="active-section" class="session-section hidden">
          <h2>Active Sessions</h2>
          <div id="active-sessions"></div>
        </section>

        <section id="past-section" class="session-section hidden">
          <h2>Past Sessions</h2>
          <div id="past-sessions"></div>
        </section>
      </div>
    </div>
  </div>
  <script src="dashboard.js"></script>
</body>
</html>
